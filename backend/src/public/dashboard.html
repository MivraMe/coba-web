<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — NotesQC</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .global-header {
      background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
      border-radius: var(--radius);
      padding: 1.5rem;
      color: #fff;
      margin-bottom: 1.5rem;
    }
    .global-header h2 { font-size: 1rem; font-weight: 600; opacity: .8; margin-bottom: 1rem; }
    .global-stats-row { display: flex; gap: 2rem; flex-wrap: wrap; }
    .global-stat { }
    .global-stat-label { font-size: .75rem; opacity: .7; text-transform: uppercase; letter-spacing: .05em; }
    .global-stat-value { font-size: 1.9rem; font-weight: 800; line-height: 1.1; }
    .global-stat-sub { font-size: .8rem; opacity: .7; margin-top: .1rem; }
    .divider-v { width: 1px; background: rgba(255,255,255,.25); align-self: stretch; }
    .global-expand-btn {
      background: rgba(255,255,255,.15); border: none; color: #fff;
      padding: .35rem .75rem; border-radius: var(--radius-sm);
      cursor: pointer; font-size: .85rem; margin-top: 1rem;
      transition: background .15s;
    }
    .global-expand-btn:hover { background: rgba(255,255,255,.25); }
    .global-expanded {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,.2);
    }
    .global-chart-wrap { position: relative; height: 220px; }
    .toggle-bar {
      display: inline-flex; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .toggle-btn {
      padding: .35rem .85rem; font-size: .875rem;
      background: var(--surface); border: none; cursor: pointer;
      color: var(--text-2); transition: background .15s, color .15s;
    }
    .toggle-btn.active { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <nav class="main-nav" id="main-nav">
    <a href="/dashboard" class="nav-brand">
      <img src="/logo/notesQC_white.png" alt="NotesQC" class="nav-logo">
    </a>
    <div class="nav-links" id="navMenu">
      <a href="/dashboard" class="nav-link active">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Tableau de bord
      </a>
      <a href="/groupes" class="nav-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
        Groupes
      </a>
      <a href="/compte" class="nav-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
        Mon compte
      </a>
      <div class="nav-sep"></div>
      <span class="nav-email"></span>
      <button class="nav-logout">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
        Déconnexion
      </button>
      <!-- Mobile only -->
      <div class="nav-mobile-sep"></div>
      <div class="nav-mobile-user">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
        <span class="nav-email-mobile"></span>
      </div>
    </div>
    <button id="burgerBtn" class="burger-btn" aria-label="Menu" aria-expanded="false">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <div class="page">
    <div class="container">

      <!-- Global header stats -->
      <div class="global-header" id="global-header">
        <div class="flex-between" style="align-items:flex-start">
          <h2>Aperçu général</h2>
          <button class="nav-logout" id="sync-btn" style="font-size:.8rem;padding:.3rem .65rem">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:.25rem"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
            Synchroniser
          </button>
        </div>
        <div id="global-stats-row" class="global-stats-row">
          <div style="opacity:.6;font-size:.9rem">Chargement…</div>
        </div>
        <button class="global-expand-btn" id="global-expand-btn">▼ Afficher plus</button>
        <div class="global-expanded hidden" id="global-expanded">
          <div class="global-chart-wrap">
            <canvas id="global-chart"></canvas>
          </div>
          <div style="position:relative;height:200px;margin-top:1.25rem">
            <canvas id="global-line-chart"></canvas>
          </div>
        </div>
      </div>
      <div id="sync-alert" class="alert alert-hidden"></div>

      <!-- Year filter -->
      <div class="year-filter" id="year-filter">
        <div class="loading-overlay"><span class="spinner spinner-dark"></span></div>
      </div>

      <!-- Controls row -->
      <div class="flex-between mb-2" id="controls-row" style="display:none">
        <span class="text-sm text-muted">Cliquez sur un cours pour voir le détail</span>
      </div>

      <!-- Courses grid -->
      <div class="courses-grid" id="courses-grid">
        <div class="loading-overlay"><span class="spinner spinner-dark"></span></div>
      </div>

      <!-- Detail panel -->
      <div class="detail-panel hidden" id="detail-panel">
        <div class="detail-header">
          <div>
            <div class="course-code" id="detail-code"></div>
            <div class="detail-title" id="detail-name"></div>
          </div>
          <div class="toggle-bar">
            <button class="toggle-btn active" id="toggle-avg">Moyenne</button>
            <button class="toggle-btn" id="toggle-med">Médiane</button>
          </div>
          <button class="btn btn-ghost btn-sm" id="detail-close">✕ Fermer</button>
        </div>

        <div class="stats-grid" id="detail-stats"></div>

        <div class="chart-container">
          <canvas id="grade-chart"></canvas>
        </div>

        <h3 style="font-size:.95rem;font-weight:600;margin-bottom:.75rem">Détail des évaluations</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Évaluation</th>
                <th>Catégorie</th>
                <th>Pond.</th>
                <th>Date</th>
                <th>Ma note</th>
                <th>Moy. groupe</th>
                <th>Méd. groupe</th>
              </tr>
            </thead>
            <tbody id="assignments-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/cookie-banner.js"></script>
  <script>
    (function() {
      var btn = document.getElementById('burgerBtn');
      var menu = document.getElementById('navMenu');
      var overlay = document.getElementById('navOverlay');
      if (!btn || !menu) return;
      function openMenu() {
        menu.classList.add('open');
        btn.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        if (overlay) overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeMenu() {
        menu.classList.remove('open');
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
        if (overlay) overlay.classList.remove('open');
        document.body.style.overflow = '';
      }
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.classList.contains('open') ? closeMenu() : openMenu();
      });
      if (overlay) overlay.addEventListener('click', closeMenu);
      menu.querySelectorAll('.nav-link').forEach(function(l) {
        l.addEventListener('click', function() { if (window.innerWidth <= 768) closeMenu(); });
      });
      document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });
    })();
  </script>
</body>
</html>
