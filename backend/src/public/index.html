<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Notes Esther-Blondin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
          </svg>
        </div>
        <h1 class="auth-title">Notes Esther-Blondin</h1>
        <p class="auth-sub">Connexion à votre espace</p>
      </div>

      <div id="alert" class="alert alert-hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Courriel</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="vous@exemple.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2" id="submit-btn">Se connecter</button>
      </form>

      <p class="text-center mt-2 text-sm text-muted">
        Pas encore de compte ? <a href="/register">Créer un compte</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
  <script src="/js/cookie-banner.js"></script>
</body>
</html>
