<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groupes — NotesQC</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="main-nav" id="main-nav">
    <a href="/dashboard" class="nav-brand">
      <img src="/logo/notesQC_white.png" alt="NotesQC" class="nav-logo">
    </a>
    <button id="burgerBtn" class="burger-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navMenu">
      <a href="/dashboard" class="nav-link">Tableau de bord</a>
      <a href="/groupes" class="nav-link">Groupes</a>
      <a href="/compte" class="nav-link">Mon compte</a>
      <span class="nav-email"></span>
      <button class="nav-logout">Déconnexion</button>
    </div>
  </nav>

  <div class="page">
    <div class="container">
      <div class="flex-between mb-2" style="margin-bottom:1.25rem">
        <h1 style="font-size:1.4rem;font-weight:700">Mes groupes</h1>
      </div>

      <div id="groups-wrap">
        <div class="loading-overlay"><span class="spinner spinner-dark"></span></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/groups.js"></script>
  <script src="/js/cookie-banner.js"></script>
  <script>
    (function() {
      var btn = document.getElementById('burgerBtn');
      var menu = document.getElementById('navMenu');
      if (!btn || !menu) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.classList.toggle('open');
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('#main-nav')) menu.classList.remove('open');
      });
    })();
  </script>
</body>
</html>
