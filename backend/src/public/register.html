<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — NotesQC</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/logo/notesQc_black.png" alt="NotesQC" class="auth-logo-img">
        <p class="auth-sub">Créer un compte</p>
      </div>

      <div id="alert" class="alert alert-hidden"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="email">Courriel</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="vous@exemple.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="8 caractères minimum" required autocomplete="new-password" minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirmer le mot de passe</label>
          <input type="password" id="confirm" name="confirm" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2" id="submit-btn">Créer mon compte</button>
      </form>

      <p class="text-center mt-2 text-sm text-muted">
        Déjà un compte ? <a href="/">Se connecter</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/register.js"></script>
  <script src="/js/cookie-banner.js"></script>
</body>
</html>
